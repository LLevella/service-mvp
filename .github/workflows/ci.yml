name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-checks:
    name: Static checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck tests/smoke.sh

  build-and-test:
    name: Build and test (${{ matrix.compiler }})
    runs-on: ubuntu-latest
    needs: static-checks

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            package: gcc
          - compiler: clang
            package: clang

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.package }}

      - name: Show compiler version
        run: ${{ matrix.compiler }} --version

      - name: Build
        run: make clean all CC=${{ matrix.compiler }}

      - name: Test
        run: make check CC=${{ matrix.compiler }}

      - name: Verify clean rebuild
        run: make clean all CC=${{ matrix.compiler }}
